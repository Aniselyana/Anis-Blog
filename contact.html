<!DOCTYPE html>
<html lang="ms">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact Me | Personal Blog</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <nav class="navbar">
        <div class="logo">MyBlog</div>
        <ul class="nav-links">
            <li><a href="index.html">Home</a></li>
            <li><a href="about.html">About</a></li>
            <li><a href="blog.html">Blog</a></li>
            <li><a href="contact.html">Contact</a></li>
        </ul>
    </nav>

    <main class="container">
        <h2>Hubungi Saya</h2>
        <p>Sila isi borang di bawah jika anda mempunyai sebarang pertanyaan.</p>

        <form class="contact-form">
            <div class="form-group">
                <label for="name">Nama:</label>
                <input type="text" id="name" placeholder="Masukkan nama anda" required>
            </div>
            <div class="form-group">
                <label for="email">E-mel:</label>
                <input type="email" id="email" placeholder="Masukkan e-mel anda" required>
            </div>
            <div class="form-group">
                <label for="message">Mesej:</label>
                <textarea id="message" rows="5" placeholder="Tulis mesej anda di sini..." required></textarea>
            </div>
            <button type="submit" class="submit-btn">Hantar Mesej</button>
        </form>
    </main>

</body>
</html>
